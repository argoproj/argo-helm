## Reference: https://github.com/actions/stale
name: Mark stale issues and pull requests
on:
  schedule:
    - cron: "30 1 * * *"

permissions: {}

jobs:
  stale:
    permissions:
      contents: read # for actions/stale to read issues and PRs
      issues: write # for actions/stale to close stale issues
      pull-requests: write # for actions/stale to close stale PRs
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Number of days of inactivity before an issue becomes stale
          days-before-stale: 60
          # Number of days of inactivity before a stale issue is closed
          days-before-close: 7
          # Issues with these labels will never be considered stale
          exempt-issue-labels: "on-hold,pinned,security,awaiting-upstream,keep"
          exempt-pr-labels: "on-hold,pinned,security,awaiting-upstream,keep"
          # Comment to post when marking an issue as stale.
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions.
          # Label to use when marking an issue as stale
          stale-issue-label: "no-issue-activity"
          stale-pr-label: "no-pr-activity"
