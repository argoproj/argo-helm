{{- if .Values.dashboards.enabled }}
{{- $files := .Files.Glob "files/grafana-dashboards/*.json" }}
{{- range $path, $fileContents := $files }}
{{- $dashboardName := regexReplaceAll "(^.*/)(.*)\\.json$" $path "${2}" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $dashboardName | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "argo-cd.dashboards.namespace" $ }}
  labels:
    {{- include "argo-cd.labels" (dict "context" $ "component" "grafana-dashboards" "name" $dashboardName) | nindent 4 }}
    {{- with $.Values.dashboards.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $.Values.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{ $dashboardName }}.json: {{ $.Files.Get $path | toJson }}
{{- end }}
{{- end }}
