{{- if .Values.server.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: {{ .Values.server.serviceAccount.automountServiceAccountToken }}
metadata:
  name: {{ include "argo-cd.server.serviceAccountName" . }}
  namespace: {{ include  "argo-cd.namespace" . }}
  {{- if or .Values.server.serviceAccount.annotations .Values.azure.workloadIdentity.enable }}
  annotations:
    {{- with .Values.server.serviceAccount.annotations }}
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- if .Values.azure.workloadIdentity.enable }}
    azure.workload.identity/client-id: {{ .Values.azure.workloadIdentity.entraSSOClientId | quote }}
    {{- if .Values.azure.workloadIdentity.tenantId }}
    azure.workload.identity/tenant-id: {{ .Values.azure.workloadIdentity.tenantId | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
  labels:
    {{- include "argo-cd.labels" (dict "context" . "component" .Values.server.name "name" .Values.server.name) | nindent 4 }}
    {{- with .Values.server.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
